{% extends 'base/base.html' %}

{% block title %}Supprimer {{ product.name }}{% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-body p-4">
        <h1 class="h3">Supprimer le produit</h1>
        <p>Voulez-vous vraiment supprimer <strong>{{ product.name }}</strong> ?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Confirmer</button>
            <a href="{% url 'product_detail' product.pk %}" class="btn btn-outline-secondary">Annuler</a>
        </form>
    </div>
</div>
{% endblock %}

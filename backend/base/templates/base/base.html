{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SimpliCulinary{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'base/css/bootstrap.min (1).css' %}">
    <style>
        body {
            background: #f6f8fb;
        }

        .site-navbar {
            background: linear-gradient(90deg, #173f35, #255d4f);
            box-shadow: 0 10px 30px rgba(23, 63, 53, 0.18);
        }

        .site-navbar .navbar-brand,
        .site-navbar .nav-link {
            color: #fff;
        }

        .site-navbar .nav-link {
            font-weight: 500;
            border-radius: 999px;
            padding: 0.6rem 1rem;
        }

        .site-navbar .nav-link:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .page-shell {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg site-navbar">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">SimpliCulinary</a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#siteNav" aria-controls="siteNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="siteNav">
                <div class="navbar-nav ms-auto gap-lg-2">
                    <a class="nav-link" href="/">Accueil</a>
                    <a class="nav-link" href="/products/">Nos produits</a>
                    <a class="nav-link" href="/products/categories/">Categories</a>
                    <a class="nav-link" href="/cart/">Panier</a>
                    <a class="nav-link" href="/admin/">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container page-shell">
        {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}
        {% endblock %}
    </main>

    <script src="{% static 'base/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
